name: Build Artifacts
on:
  push:
    branches:
      - main
jobs:
  ##
  ## BUILD SnowPME
  ##
  ubuntu_meson_build:
    name: Build Linux (GCC)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true
      - uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: build-essential meson libsdl2-dev mesa-utils libglu1-mesa-dev freeglut3-dev mesa-common-dev automake libtool-bin gettext libc++-dev libc-dev
          version: 1.0
      - name: Meson Build
        run: |
            meson setup build
            cd build
            ninja
      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: SnowPME-Linux
          path: build/SnowPME
  windows_msvc_build:
    name: Build Windows (Microsoft Visual C++)
    runs-on: windows-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Get Submodules
        run: git submodule update --init --recursive
      - name: Run Developer Command Prompt
        uses: TheMrMilchmann/setup-msvc-dev@v3.0.1
        with:
          arch: x86
      - name: MSBuild SnowPME.sln
        run: MSBuild SnowPME.sln /p:Configuration=Release_Static /p:Platform=Win32
      - name: Upload Binaries
        uses: actions/upload-artifact@v4
        with:
          name: SnowPME-Windows
          path: build/SnowPME/bin/SnowPME.exe
  build_psm_tests:
    name: Build Test Suite (PSM SDK v2.00)
    runs-on: windows-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v2
        with:
          fetch-depth: 0
      - name: Install PlayStation Mobile SDK
        uses: OpenPSS/install-psm-sdk@v1
        with:
            version: 2.00.00
      - name: Add MSBuild to Path
        run: $Env:WinDir+"\Microsoft.NET\Framework\v4.0.30319" >> $Env:GITHUB_PATH
      - name: MSBuild PsmTestSuite
        run: MSBuild tests/PsmTestSuite.sln /p:Configuration=Release /p:Platform="Any CPU"
      - name: Run Tests Script
        run: copy tests/run_tests.cmd tests/build/run_tests.cmd
      - name: Upload Test Binaries
        uses: actions/upload-artifact@v4
        with:
          name: SnowPME-Tests
          path: tests/build
          
  ##
  ## RUN Unit Tests
  ##
  test_windows:
    name: Run Test Suite (Windows)
    runs-on: windows-latest
    needs:
        - build_psm_tests
        - ubuntu_meson_build
        - windows_msvc_build
    steps:
      - name: Install PlayStation Mobile SDK
        uses: OpenPSS/install-psm-sdk@v1
        with:
            version: 2.00.00
      - name: Download Windows Artifact
        uses: actions/download-artifact@main
        with:
            pattern: "SnowPME-Windows"
            path: ./
            merge-multiple: true
      - name: Download Test Suite
        uses: actions/download-artifact@main
        with:
            pattern: "SnowPME-Tests"
            path: ./psm
            merge-multiple: true
            
      - name: Setup SnowPME
        run: |
            mkdir testout
            mkdir dll
            mkdir dll/mono
            mkdir dll/mono/2.1
            echo "Config::DebugLogging=true" >>SnowPME.cfg
            copy $env:SCE_PSM_SDK/mono/lib/mono/2.1/mscorlib.dll dll/mono/2.1/mscorlib.dll
            copy $env:SCE_PSM_SDK/mono/lib/mono/2.1/System.dll dll/mono/2.1/System.dll
            copy $env:SCE_PSM_SDK/mono/lib/psm/2.1/Sce.PlayStation.Core.dll dll/mono/2.1/Sce.PlayStation.Core.dll
      - name: Run Tests
        continue-on-error: true
        run: ./psm/run_tests.cmd
      - name: Upload Test Logs
        uses: actions/upload-artifact@v4
        with:
            name: SnowPME-TestLogs-Windows
            path: testout
